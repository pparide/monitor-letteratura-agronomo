name: Weekly Literature Digest

on:
  schedule:
    # Lunedì 7:00 UTC = 8:00 CET (inverno) / 9:00 CEST (estate)
    - cron: '0 7 * * 1'
  # Trigger manuale dalla UI di GitHub
  workflow_dispatch:
    inputs:
      since_days:
        description: 'Lookback window in days (default 14)'
        required: false
        default: '14'
        type: string
      dry_run:
        description: 'Dry run (do not update seen.json)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: weekly-digest
  cancel-in-progress: false

jobs:
  digest:
    name: Generate weekly digest
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run digest pipeline
        env:
          SINCE_DAYS: ${{ inputs.since_days || '14' }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            python -m src.main --since-days "$SINCE_DAYS" --dry-run
          else
            python -m src.main --since-days "$SINCE_DAYS"
          fi

      - name: Commit and push digest
        if: ${{ inputs.dry_run != true }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add digest/ config/seen.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            ISO_WEEK=$(date -u +%G-W%V)
            git commit -m "weekly digest ${ISO_WEEK}"
            git push
          fi
